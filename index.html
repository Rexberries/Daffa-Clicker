<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAFFA CLICKER</title>
    <style>
        :root {
            /* Palet Warna Cute Pastel */
            --bg-color: #fdf2f8; /* Pink sangat muda */
            --main-pink: #f472b6; /* Pink cerah tapi lembut */
            --text-color: #475569; /* Abu-abu tua lembut */
            --accent-blue: #a5f3fc; /* Biru langit pastel */
            --accent-yellow: #fef08a; /* Kuning pastel */
            --panel-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Font lebih bersih */
            color: var(--text-color);
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmOWE4ZDIiIGZpbGwtb3BhY2l0eT0iMC4yIj48cGF0aCBkPSJNMDAgaDB2NDBIMEwwIDB6TTIwIDIwaDIwdjIwSDIwVjIweiIvPjwvZz48L2c+PC9zdmc+'); /* Pola kotak tipis */
        }

        /* --- SCREEN: WELCOME & TUTORIAL --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .cute-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(244, 114, 182, 0.2);
            border: 5px solid var(--main-pink);
            max-width: 500px;
        }

        #welcome-screen h1 {
            color: var(--main-pink);
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px white;
        }

        .tutorial-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #64748b;
        }

        .tutorial-text b { color: var(--main-pink); }

        #play-button {
            background-color: var(--main-pink);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(244, 114, 182, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        #play-button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(244, 114, 182, 0.5); }
        #play-button:active { transform: translateY(1px); }

        /* --- SCREEN: GAME --- */
        #top-gui {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .score-container {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--main-pink);
            margin: 0;
            text-shadow: 2px 2px 0px white, -2px -2px 0px white;
        }

        #combo-ui {
            font-size: 1.8rem;
            color: #a78bfa; /* Ungu muda */
            font-weight: bold;
            display: none;
            margin-top: -10px;
        }

        /* Target Kucing */
        #pixie-target {
            position: absolute;
            width: 130px;
            cursor: pointer;
            z-index: 50;
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            transform: translate(-50%, -50%);
            display: none; /* Sembunyikan sampai game mulai */
        }

        #pixie-target:active {
            transform: translate(-50%, -50%) scale(0.8) rotate(-10deg) !important;
        }

        /* Teks Melayang */
        .float-text {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            z-index: 150;
            animation: floatMove 0.8s ease-out forwards;
            font-size: 1.5rem;
        }

        @keyframes floatMove {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(10px, -100px) scale(1.4); opacity: 0; }
        }

        /* Panel Shop */
        #shop-toggle {
            position: absolute;
            bottom: 25px;
            left: 25px; /* Pindah ke kiri biar ga tabrakan sama target awal */
            background-color: white;
            color: var(--main-pink);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            border: 3px solid var(--main-pink);
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        #shop-panel {
            position: absolute;
            right: -300px;
            top: 0;
            width: 260px;
            height: 100%;
            background: var(--panel-bg);
            border-left: 3px solid var(--accent-blue);
            transition: 0.3s;
            z-index: 199;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(5px);
        }

        #shop-panel.open { right: 0; }

        .upgrade-btn {
            background: white;
            border: 2px solid #e2e8f0;
            color: var(--text-color);
            padding: 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            font-family: inherit;
        }

        .upgrade-btn:hover { border-color: var(--main-pink); background-color: #fff1f2; }
        .upgrade-btn b { color: var(--main-pink); }

        /* Effects */
        .wobble { animation: wobble 0.3s infinite; }
        @keyframes wobble {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(0); }
        }

        #event-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: #fcd34d; /* Kuning cerah */
            font-weight: 900;
            z-index: 300;
            display: none;
            text-align: center;
            text-shadow: 3px 3px 0px white, -3px -3px 0px white;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="onMiss(event)">

    <div id="welcome-screen">
        <div class="cute-card">
            <h1>Halo Daffa!</h1>
            <p class="tutorial-text">
                Selamat datang di game santai ini. Tugas kamu mudah:<br><br>
                1. <b>Klik gambar kucing</b> secepat mungkin.<br>
                2. Jangan sampai <b>meleset</b> (klik area kosong).<br>
                3. Kumpulkan <b>Meow Points</b> untuk beli upgrade imut!<br><br>
                Siap bermain?
            </p>
            <button id="play-button" onclick="startGame()">Mulai Game ✨</button>
        </div>
    </div>

    <div id="game-container">

        <div id="top-gui">

            <div id="combo-ui">Combo x0 ✨</div>

        <img id="pixie-target" 
             src="daffa.jpg" 
             alt="Kucing Imut" 
             onclick="onTargetClick(event)">

        <button id="shop-toggle" onclick="toggleShop(event)">🎁 Kedai Kucing</button>
        
        <div id="shop-panel">
            <h2 style="color: var(--main-pink); margin-top: 0;">Upgrade Imut</h2>
            <button class="upgrade-btn" onclick="buyUpgrade('catnip', 50, event)">🌿 <b>Susu Ajaib (50)</b><br>Kucing jadi lebih santai.</button>

        </div>
    </div>

</body>
</html>
